---
# Stage 6: Observability-only values file.
# Used by the apollo11-observability Application (argocd/applications/observability.yaml).
#
# Disables the app layer (we don't want this release to deploy apps — those
# are owned by apollo11-{dev,staging,prod}) and enables the observability
# layer.
#
# Key design choice: the observability namespace + everything in it lives in
# ONE chart (this one) so that `helm install` is a single transaction. The
# alternative — separating observability into its own chart — would mean
# duplicating templates and adding another install step.

# ----------------------------------------------------------------------------
# Observability ON
# ----------------------------------------------------------------------------
observability:
  enabled: true
  namespace: apollo-observability

  prometheus:
    enabled: true
    image: prom/prometheus:v2.51.2
    retention: 7d
    storage: 5Gi
  grafana:
    enabled: true
    image: grafana/grafana:10.4.2
    adminUser: admin
    adminPassword: apollo-admin
    anonymousAccess: true
    storage: 1Gi
  otelCollector:
    enabled: true
    image: otel/opentelemetry-collector-contrib:0.99.0
  tempo:
    enabled: true
    image: grafana/tempo:2.3.1
    storage: 5Gi
  loki:
    enabled: true
    image: grafana/loki:2.9.8
    storage: 5Gi
  promtail:
    enabled: true
    image: grafana/promtail:2.9.8

# ----------------------------------------------------------------------------
# Everything else OFF — this release owns observability only.
# ----------------------------------------------------------------------------
# The chart's templates for these are rendered as no-ops when the
# parent toggle is false. Disabling here is what makes this release
# the "observability" release rather than the "all of Apollo11" release.

# Gateway is already managed by the workload releases; disable here.
gateway:
  enabled: false
  bundleInstall: false

metallb:
  enabled: false
  bundleInstall: false

# Disable all app + infra + jobs + pdb + ui rendering. Each `<group>.enabled`
# short-circuits its template with `{{- if .Values.<group>.enabled }}`.
apps:
  enabled: false
  identity:
    port: 8080
    replicas: 0
    tier: default
  flight:
    port: 8081
    replicas: 0
    tier: default
  booking:
    port: 8082
    replicas: 0
    tier: flagship
  search:
    port: 8083
    replicas: 0
    tier: default
  notification:
    port: 8084
    replicas: 0
    tier: low

infra:
  enabled: false

ui:
  enabled: false
  frontend:
    port: 3000
    replicas: 0
    tier: edge

pdb:
  enabled: false

jobs:
  enabled: false

# Namespaces still need to be created by something — but they're not
# rendered by this release. The workload releases create apollo-airlines-apps
# and apollo-airlines-ui. The observability namespace is created by the
# observability/namespace.yaml template (under observability.enabled).

# Resource tiers (required by the chart's schema; we don't deploy anything
# so values are arbitrary).
tiers:
  default:  { cpu: 100m, memory: 128Mi }
  flagship: { cpu: 200m, memory: 256Mi }
  low:      { cpu: 50m,  memory: 64Mi }
  edge:     { cpu: 50m,  memory: 64Mi }

# Required stubs.
probes:
  startup:   { httpGet: { path: /healthz/startup }, initialDelaySeconds: 0,  periodSeconds: 5, failureThreshold: 6 }
  liveness:  { httpGet: { path: /healthz/live },    initialDelaySeconds: 15, periodSeconds: 10, failureThreshold: 3 }
  readiness: { httpGet: { path: /healthz/ready },   initialDelaySeconds: 5,  periodSeconds: 5,  failureThreshold: 3 }
terminationGracePeriod:
  apps: 30
  statefulset: 60
serviceAccounts:
  apps: []
  data: []
  initJobs: []
  ui: []
config:
  appsNamespace: apollo-airlines-apps
  uiNamespace: apollo-airlines-ui
  viteUrls:
    identity: "http://identity.apollo.local"
    flight:   "http://flight.apollo.local"
    booking:  "http://booking.apollo.local"
    search:   "http://search.apollo.local"
secret:
  postgresPassword: "postgres"
  jwtSecret: "apollo-airlines-dev-secret-change-in-production"
image:
  repository: apollo11
  pullPolicy: IfNotPresent
  tag: latest
