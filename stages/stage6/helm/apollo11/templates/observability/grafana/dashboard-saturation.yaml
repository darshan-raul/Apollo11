apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-saturation
  namespace: apollo-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: apollo-airlines
    grafana_dashboard: "1"
data:
  dashboard.json: '{"annotations":{"list":[]},"editable":true,"fiscalYearStartMonth":0,"graphTooltip":1,"id":null,"uid":"apollo-saturation","title":"Resource Saturation","tags":["apollo"],"timezone":"browser","schemaVersion":39,"version":1,"refresh":"30s","time":{"from":"now-1h","to":"now"},"templating":{"list":[]},"panels":[{"id":1,"type":"timeseries","title":"Container CPU usage (cores)","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":0,"y":0},"targets":[{"datasource":{"type":"prometheus","uid":"prometheus"},"expr":"sum by (namespace, pod, container) (rate(container_cpu_usage_seconds_total{namespace=~\"apollo-.*|apollo-airlines-.*\"}[5m]))","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","custom":{"lineWidth":2,"fillOpacity":10,"showPoints":"never"}}},"options":{"legend":{"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}}},{"id":2,"type":"timeseries","title":"Container memory usage (bytes)","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":12,"y":0},"targets":[{"datasource":{"type":"prometheus","uid":"prometheus"},"expr":"sum by (namespace, pod, container) (container_memory_working_set_bytes{namespace=~\"apollo-.*|apollo-airlines-.*\"})","refId":"A"}],"fieldConfig":{"defaults":{"unit":"bytes","custom":{"lineWidth":2,"fillOpacity":10,"showPoints":"never"}}},"options":{"legend":{"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}}},{"id":3,"type":"timeseries","title":"Pod restart count (5m)","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":0,"y":8},"targets":[{"datasource":{"type":"prometheus","uid":"prometheus"},"expr":"sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"apollo-.*|apollo-airlines-.*\"}[5m]))","refId":"A"}],"fieldConfig":{"defaults":{"unit":"short","custom":{"lineWidth":2,"fillOpacity":10,"showPoints":"never"}}},"options":{"legend":{"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}}},{"id":4,"type":"timeseries","title":"PVC usage %","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":12,"y":8},"targets":[{"datasource":{"type":"prometheus","uid":"prometheus"},"expr":"(kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","custom":{"lineWidth":2,"fillOpacity":10,"showPoints":"never"}}},"options":{"legend":{"displayMode":"table","placement":"bottom","showLegend":true},"tooltip":{"mode":"multi","sort":"desc"}}}],"description":"Pod CPU, memory, and restart metrics."}'
