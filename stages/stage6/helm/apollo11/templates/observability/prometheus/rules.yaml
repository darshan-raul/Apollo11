apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: apollo-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: apollo-airlines
data:
  apollo-rules.yml: |
    # Apollo11 alert rules. Loaded by Prometheus from /etc/prometheus/rules.
    # 16 rules across 4 groups: apollo_services, apollo_latency, apollo_errors,
    # apollo_infrastructure.
    #
    # Severity levels:
    #   info     - log only, no paging
    #   warning  - SRE should look within the working day
    #   critical - page immediately (Stage 8 wires Slack/PD via Alertmanager)
    groups:
      # ------------------------------------------------------------------
      # Group 1: Apollo service availability
      # ------------------------------------------------------------------
      - name: apollo_services
        interval: 30s
        rules:
          - alert: ApolloServiceDown
            expr: up{job=~"apollo11-.*"} == 0
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: 'Apollo service is down'
              description: 'Prometheus has not been able to scrape for 2 minutes. Pods may be CrashLoopBackOff, Service may have no endpoints, or the metrics endpoint may be returning errors.'

          - alert: ApolloServiceFlapping
            expr: changes(up{job=~"apollo11-.*"}[10m]) > 6
            for: 0m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: 'Apollo service is flapping'
              description: 'Service has changed state more than 6 times in the last 10 minutes. Likely an unstable rollout or readiness probe issue.'

          - alert: ApolloStatefulSetDown
            expr: kube_statefulset_status_replicas_ready{namespace="apollo-airlines-apps"} == 0
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: 'StatefulSet has 0 ready replicas'
              description: 'A database StatefulSet is fully down. This will cascade into 5xx errors across all app services within 60s.'

      # ------------------------------------------------------------------
      # Group 2: Latency
      # ------------------------------------------------------------------
      - name: apollo_latency
        interval: 30s
        rules:
          - alert: ApolloBookingLatencyP95High
            expr: histogram_quantile(0.95, sum by (le, service) (rate(http_request_duration_ms_bucket{service="booking"}[5m]))) > 500
            for: 5m
            labels:
              severity: warning
              team: platform
              service: booking
            annotations:
              summary: 'booking p95 latency > 500ms'
              description: 'The 95th percentile latency for booking requests has been over 500ms for 5 minutes. Threshold is 500ms; investigate the flight-db or identity-db first.'

          - alert: ApolloBookingLatencyP99Critical
            expr: histogram_quantile(0.99, sum by (le, service) (rate(http_request_duration_ms_bucket{service="booking"}[5m]))) > 1500
            for: 5m
            labels:
              severity: critical
              team: platform
              service: booking
            annotations:
              summary: 'booking p99 latency > 1.5s'
              description: 'p99 booking latency has been over 1.5s for 5 minutes. Tail latency usually means a downstream service is saturated or a single pod is unhealthy.'

          - alert: ApolloSearchLatencyP95High
            expr: histogram_quantile(0.95, sum by (le, service) (rate(http_request_duration_ms_bucket{service="search"}[5m]))) > 300
            for: 5m
            labels:
              severity: warning
              team: platform
              service: search
            annotations:
              summary: 'search p95 latency > 300ms'
              description: 'Search calls flight service. Latency over 300ms usually means flight-db is slow or the flight service has saturated pods.'

          - alert: ApolloFlightLatencyP95High
            expr: histogram_quantile(0.95, sum by (le, service) (rate(http_request_duration_ms_bucket{service="flight"}[5m]))) > 200
            for: 5m
            labels:
              severity: warning
              team: platform
              service: flight
            annotations:
              summary: 'flight p95 latency > 200ms'
              description: 'flight-db query latency. Usually caused by missing index or full table scan. Check flight-db resource saturation.'

      # ------------------------------------------------------------------
      # Group 3: Error rate
      # ------------------------------------------------------------------
      - name: apollo_errors
        interval: 30s
        rules:
          - alert: ApolloErrorRateHigh
            expr: |
              (
                sum by (service) (rate(http_requests_total{status=~"5.."}[5m]))
                /
                sum by (service) (rate(http_requests_total[5m]))
              ) > 0.05
            for: 5m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: '5xx error rate > 5%'
              description: 'Service has been returning 5xx errors on more than 5% of requests for 5 minutes. Common causes: DB connection pool exhausted, downstream 5xx, OOMKill.'

          - alert: ApolloErrorRateSpike
            expr: |
              sum by (service) (rate(http_requests_total{status=~"5.."}[1m])) > 1
            for: 2m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: 'spiking 5xx errors'
              description: 'Service is producing more than 1 error/second over the last minute. Investigate before users notice.'

          - alert: ApolloAuthFailuresHigh
            expr: |
              sum(rate(http_requests_total{status="401"}[5m])) > 0.5
            for: 10m
            labels:
              severity: info
              team: security
            annotations:
              summary: 'High rate of 401 responses (potential brute force)'
              description: 'More than 0.5 401s/sec sustained for 10 minutes. Could be a misconfigured client or an actual attack.'

      # ------------------------------------------------------------------
      # Group 4: Infrastructure
      # ------------------------------------------------------------------
      - name: apollo_infrastructure
        interval: 30s
        rules:
          - alert: ApolloPodOOMKilled
            expr: |
              increase(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[15m]) > 0
            for: 0m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: 'Pod was OOMKilled'
              description: 'A pod was OOMKilled in the last 15 minutes. Either raise the memory limit or investigate the leak.'

          - alert: ApolloPodCrashLooping
            expr: |
              rate(kube_pod_container_status_restarts_total[15m]) > 0.1
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: 'Pod is crash-looping'
              description: 'Pod has restarted more than 0.1 times/min (so > 1.5 in 15min) for at least 5 minutes.'

          - alert: ApolloPVCAlmostFull
            expr: |
              (
                kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes
              ) > 0.85
            for: 10m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: 'PVC is > 85% full'
              description: 'A database or observability PVC is over 85% full. If this hits 100% the StatefulSet will go read-only or pod will crash.'

          - alert: ApolloNodeCPUHigh
            expr: |
              100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
            for: 10m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: 'Node CPU > 80%'
              description: 'Node CPU saturation. On kind this almost always means the test cluster is undersized for what we are running.'

          - alert: ApolloNodeMemoryHigh
            expr: |
              (
                1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
              ) * 100 > 85
            for: 10m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: 'Node memory > 85%'
              description: 'Node memory saturation. On kind this almost always means the test cluster is undersized for what we are running.'

          - alert: ApolloTempoStorageHigh
            expr: |
              (
                node_filesystem_avail_bytes{mountpoint="/var/tempo/blocks"} / node_filesystem_size_bytes{mountpoint="/var/tempo/blocks"}
              ) < 0.15
            for: 10m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: 'Tempo storage is > 85% full'
              description: 'Trace storage is running out of space. Old blocks will fail to compact and writes will eventually fail.'
