{{- /*
3 Postgres StatefulSets, generated by looping over the 3 schema/seed entries
in values.yaml. Each StatefulSet:

  * uses the official postgres:15-alpine image
  * mounts a 1Gi PVC for the data dir
  * mounts an init-SQL ConfigMap at /docker-entrypoint-initdb.d so the
    schema is applied on first start (when the data dir is empty). On
    every subsequent restart Postgres sees the data dir is populated and
    skips /docker-entrypoint-initdb.d/ — schema is not re-run.
  * has liveness + readiness probes (both `pg_isready`); NO startupProbe
    because Postgres' own initdb is an implicit startup check that races
    with startupProbe.
  * 60s terminationGracePeriodSeconds — Postgres needs time to checkpoint.

Why a ConfigMap, not an init container: the init container pattern deadlocks.
The init's `pg_isready` against 127.0.0.1 waits for the main container,
but the kubelet gates the main container on the init's success. The
entrypoint hook is the standard Postgres pattern and avoids the deadlock.
*/ -}}
{{- $databases := list "identity" "flight" "booking" -}}
{{- range $db := $databases }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $db }}-db-init-script
  namespace: {{ $.Values.namespaces.apps }}
  labels:
    {{- include "apollo11.labels" $ | nindent 4 }}
data:
  init.sql: |-
    {{- index $.Values.postgres.initScripts $db | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $db }}-db-seed
  namespace: {{ $.Values.namespaces.apps }}
  labels:
    {{- include "apollo11.labels" $ | nindent 4 }}
data:
  seed.sql: |-
    {{- index $.Values.postgres.seedSql $db | nindent 4 }}
---
# ClusterIP service — the regular DNS name `<db>-db` resolves to this.
apiVersion: v1
kind: Service
metadata:
  name: {{ $db }}-db
  namespace: {{ $.Values.namespaces.apps }}
  labels:
    {{- include "apollo11.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ $db }}-db
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
---
# Headless service — wired as `serviceName` on the StatefulSet. Gives the
# pod a stable DNS name: <db>-db-0.<db>-db-headless.<ns>.svc.cluster.local.
apiVersion: v1
kind: Service
metadata:
  name: {{ $db }}-db-headless
  namespace: {{ $.Values.namespaces.apps }}
  labels:
    {{- include "apollo11.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: {{ $db }}-db
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $db }}-db
  namespace: {{ $.Values.namespaces.apps }}
  labels:
    {{- include "apollo11.labels" $ | nindent 4 }}
spec:
  serviceName: {{ $db }}-db-headless
  replicas: 1
  selector:
    matchLabels:
      app: {{ $db }}-db
  template:
    metadata:
      labels:
        {{- include "apollo11.podLabels" (dict "root" $ "name" (printf "%s-db" $db) "tier" "data") | nindent 8 }}
    spec:
      serviceAccountName: {{ $db }}-db
      terminationGracePeriodSeconds: {{ $.Values.terminationGracePeriod.data }}
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo-airlines-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ $db }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", {{ $db | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", {{ $db | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml $.Values.postgres.resources | nindent 12 }}
      volumes:
        - name: init-script
          configMap:
            name: {{ $db }}-db-init-script
  volumeClaimTemplates:
    - metadata:
        name: pg-data
        labels:
          {{- include "apollo11.labels" $ | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        # storageClassName is intentionally omitted — kind's default
        # local-path StorageClass is used.
        resources:
          requests:
            storage: {{ $.Values.postgres.storage }}
