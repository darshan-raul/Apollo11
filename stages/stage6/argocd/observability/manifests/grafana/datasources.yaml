apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: apollo-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: apollo-airlines
data:
  # Grafana's "unified alerting" reads from this file. Stage 8 will wire
  # Slack/PD contact points; for now we just declare the contact point as
  # an internal webhook (no-op).
  alerting.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: apollo-alerts
        folder: Apollo
        interval: 1m
        rules:
          - uid: apollo-booking-p95
            title: Apollo booking p95 latency
            condition: A
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_ms_bucket{service="booking"}[5m])))
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
            noDataState: NoData
            execErrState: Alerting
            for: 5m
            annotations:
              summary: Booking p95 latency over threshold
          - uid: apollo-error-rate
            title: Apollo 5xx error rate
            condition: A
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  expr: sum by (service) (rate(http_requests_total{status=~"5.."}[5m])) / sum by (service) (rate(http_requests_total[5m]))
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
            noDataState: NoData
            execErrState: Alerting
            for: 5m
            annotations:
              summary: Service 5xx rate elevated
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 30s
          manageAlerts: true
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: true
        jsonData:
          maxLines: 1000
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo:3100
        editable: true
        jsonData:
          tracesToLogsV2: {}
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          search:
            hide: false
