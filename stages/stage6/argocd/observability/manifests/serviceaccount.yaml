apiVersion: v1
kind: ServiceAccount
metadata:
  name: observability-stack
  namespace: apollo-observability
  labels:
    app.kubernetes.io/name: apollo-observability
    app.kubernetes.io/part-of: apollo-airlines
---
# ClusterRole: the observability stack reads service endpoints, pods,
# configmaps across all namespaces for the Prometheus operator's ServiceMonitor
# discovery. We do NOT grant write or cluster-wide admin rights.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apollo-observability
  labels:
    app.kubernetes.io/part-of: apollo-airlines
rules:
  - apiGroups: [""]
    resources: [services, endpoints, pods, configmaps, namespaces]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets, daemonsets]
    verbs: [get, list, watch]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: [ingresses]
    verbs: [get, list, watch]
  # ServiceMonitors + PodMonitors are how Prometheus discovers targets.
  - apiGroups: ["monitoring.coreos.com"]
    resources: [servicemonitors, podmonitors, prometheusrules]
    verbs: [get, list, watch]
  - nonResourceURLs: ["/metrics", "/metrics/"]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: apollo-observability
  labels:
    app.kubernetes.io/part-of: apollo-airlines
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: apollo-observability
subjects:
  - kind: ServiceAccount
    name: observability-stack
    namespace: apollo-observability
