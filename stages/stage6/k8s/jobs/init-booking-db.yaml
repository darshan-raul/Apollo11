apiVersion: batch/v1
kind: Job
metadata:
  name: init-booking-db
  namespace: apollo11-infra
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: init-booking-db
    spec:
      containers:
        - name: init
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for booking-db to be ready..."
              until pg_isready -h booking-db.apollo11-infra.svc.cluster.local -U postgres; do
                echo "Waiting for booking-db..."
                sleep 2
              done
              psql -h booking-db.apollo11-infra.svc.cluster.local -U postgres -d booking -f /init/init.sql || true
              echo "booking DB init done"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: init-script
              mountPath: /init
      volumes:
        - name: init-script
          configMap:
            name: booking-init-script
      restartPolicy: OnFailure