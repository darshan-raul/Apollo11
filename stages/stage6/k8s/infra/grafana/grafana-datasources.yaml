apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: apollo11-infra
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-operator.apollo11-infra.svc.cluster.local:9090
        isDefault: true
        editable: true
        basicAuth: true
        basicAuthUser: admin
        basicAuthPassword: admin