apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: apollo11-infra
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: apollo11-infra
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector:latest
          env:
            - name: OTEL_EXPORTER_LOGGING_VERBOSITY
              value: "debug"
          args:
            - --config=/etc/otel-collector/collector.yml
          ports:
            - containerPort: 4317
              protocol: TCP
            - containerPort: 4318
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel-collector
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-config