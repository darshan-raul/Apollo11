apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: apollo11-ui
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: frontend.apollo11.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80