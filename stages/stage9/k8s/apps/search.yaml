apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: apollo11-apps
  labels:
    app: search
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
        tier: backend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: search
      containers:
        - name: search
          image: apollo11/search:latest
          ports:
            - containerPort: 8083
          env:
            - name: FLIGHT_SERVICE_URL
              value: "http://flight.apollo11-apps.svc.cluster.local:8081"
            - name: REDIS_HOST
              value: "redis.apollo11-infra.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: search
  namespace: apollo11-apps
spec:
  ports:
    - port: 8083
      targetPort: 8083
      name: http
  selector:
    app: search
