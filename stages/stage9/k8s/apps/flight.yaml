apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight
  namespace: apollo11-apps
  labels:
    app: flight
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flight
  template:
    metadata:
      labels:
        app: flight
        tier: backend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: flight
      containers:
        - name: flight
          image: apollo11/flight:latest
          ports:
            - containerPort: 8081
          env:
            - name: DATABASE_HOST
              value: "flight-db.apollo11-infra.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "flight_db"
            - name: DATABASE_USER
              value: "apollo11"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: POSTGRES_PASSWORD
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: flight
  namespace: apollo11-apps
spec:
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  selector:
    app: flight
