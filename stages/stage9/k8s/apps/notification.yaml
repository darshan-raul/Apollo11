apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: apollo11-apps
  labels:
    app: notification
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
        tier: backend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: notification
      containers:
        - name: notification
          image: apollo11/notification:latest
          ports:
            - containerPort: 8084
          env:
            - name: REDIS_HOST
              value: "redis.apollo11-infra.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: apollo11-apps
spec:
  ports:
    - port: 8084
      targetPort: 8084
      name: http
  selector:
    app: notification
