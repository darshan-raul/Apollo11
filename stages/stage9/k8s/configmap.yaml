  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  VITE_IDENTITY_URL: "http://identity.apollo11-apps.svc.cluster.local:8080"
  VITE_FLIGHT_URL: "http://flight.apollo11-apps.svc.cluster.local:8081"
  VITE_BOOKING_URL: "http://booking.apollo11-apps.svc.cluster.local:8082"
  VITE_SEARCH_URL: "http://search.apollo11-apps.svc.cluster.local:8083"
