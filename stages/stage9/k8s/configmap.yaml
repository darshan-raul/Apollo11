apiVersion: v1
kind: ConfigMap
metadata:
  name: apollo11-config
  namespace: apollo11-apps
data:
  SERVICE_PORT: "8080"
  DATABASE_HOST: "identity-db.apollo11-infra.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "identity_db"
  REDIS_HOST: "redis.apollo11-infra.svc.cluster.local"
