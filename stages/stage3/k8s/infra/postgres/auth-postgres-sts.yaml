apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-postgres
  namespace: apollo11-infra
spec:
  serviceName: auth-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: auth-postgres
  template:
    metadata:
      labels:
        app: auth-postgres
    spec:
      serviceAccountName: apollo11-infra
      # Init container: runs once before postgres main container starts.
      # Idempotent SQL (CREATE TABLE IF NOT EXISTS / ON CONFLICT DO NOTHING)
      # so re-running on pod restart is safe.
      initContainers:
        - name: init
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for auth-postgres to be ready..."
              until pg_isready -h auth-postgres -U postgres; do
                sleep 1
              done
              echo "auth-postgres is up — running init SQL"
              psql -h auth-postgres -U postgres -d auth -f /init/init.sql || true
              echo "auth DB init complete"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: init-script
              mountPath: /init
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "auth"
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: auth-postgres-init-script
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
