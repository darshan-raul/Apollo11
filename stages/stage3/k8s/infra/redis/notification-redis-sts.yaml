apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: notification-redis
  namespace: apollo11-infra
spec:
  serviceName: notification-redis-headless
  replicas: 1
  selector:
    matchLabels:
      app: notification-redis
  template:
    metadata:
      labels:
        app: notification-redis
    spec:
      serviceAccountName: apollo11-infra
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6380
          command: ["redis-server", "--port", "6380"]
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
