apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: apollo-gateway
  namespace: apollo-airlines-apps
spec:
  gatewayClassName: eg
  listeners:
    - name: web
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
  # Envoy Gateway v1.5.0: the auto-created Service defaults to
  # type=LoadBalancer. MetalLB (in k8s/metallb/) assigns a real IP.
