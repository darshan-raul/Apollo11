apiVersion: v1
kind: ConfigMap
metadata:
  name: flight-db-seed
  namespace: apollo-airlines-apps
data:
  seed.sql: |
    -- Flight seed: 6 airports + 6 flights/day for 30 days = 186 flight rows.
    -- Idempotency:
    --   airports: ON CONFLICT (code) DO NOTHING  (code is UNIQUE)
    --   flights:  no ON CONFLICT — generated by CROSS JOIN over 31 days,
    --     so flight_number repeats. The (flight_number, departure_time)
    --     pair is implicitly unique. Re-running this seed will add more
    --     rows; for a clean re-seed, `TRUNCATE flights` first.
    INSERT INTO airports (id, code, name, city, country) VALUES
        ('11111111-1111-1111-1111-111111111111', 'BOM', 'Chhatrapati Shivaji Maharaj International', 'Mumbai', 'India'),
        ('22222222-2222-2222-2222-222222222222', 'DEL', 'Indira Gandhi International', 'New Delhi', 'India'),
        ('33333333-3333-3333-3333-333333333333', 'SIN', 'Changi Airport', 'Singapore', 'Singapore'),
        ('44444444-4444-4444-4444-444444444444', 'DXB', 'Dubai International', 'Dubai', 'UAE'),
        ('55555555-5555-5555-5555-555555555555', 'LHR', 'Heathrow Airport', 'London', 'UK'),
        ('66666666-6666-6666-6666-666666666666', 'JFK', 'John F. Kennedy International', 'New York', 'USA')
    ON CONFLICT (code) DO NOTHING;

    -- Generate 6 flights/day for the next 30 days (31 days total).
    -- Cast dep_time / arr_time to ::time explicitly (the previous
    -- `TIME f.dep_time` form fails on psql 15.18 with "syntax error at f").
    INSERT INTO flights (flight_number, origin, destination, departure_time, arrival_time, total_capacity, available_seats, status)
    SELECT
        f.flight_number,
        f.origin,
        f.destination,
        (CURRENT_DATE + n * INTERVAL '1 day' + f.dep_time::time)::timestamp,
        (CURRENT_DATE + n * INTERVAL '1 day' + f.arr_time::time)::timestamp,
        f.total_capacity,
        f.total_capacity,
        'SCHEDULED'
    FROM (VALUES
        ('AA101', 'BOM', 'SIN', '08:00:00'::time, '14:30:00'::time, 180),
        ('AA102', 'SIN', 'BOM', '20:00:00'::time, '23:30:00'::time, 180),
        ('AA201', 'DEL', 'DXB', '09:30:00'::time, '13:00:00'::time, 220),
        ('AA202', 'DXB', 'DEL', '22:00:00'::time, '02:30:00'::time, 220),
        ('AA301', 'BOM', 'LHR', '01:00:00'::time, '10:00:00'::time, 300),
        ('AA401', 'DEL', 'JFK', '02:00:00'::time, '14:00:00'::time, 280)
    ) AS f(flight_number, origin, destination, dep_time, arr_time, total_capacity)
    CROSS JOIN generate_series(0, 30) AS n;
