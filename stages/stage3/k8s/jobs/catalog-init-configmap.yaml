apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-init-script
  namespace: apollo11-apps
data:
  init.sql: |
    -- Enable uuid extension
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- Authors table
    CREATE TABLE IF NOT EXISTS authors (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        name VARCHAR(255) NOT NULL,
        bio TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- Books table
    CREATE TABLE IF NOT EXISTS books (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        isbn VARCHAR(20) UNIQUE NOT NULL,
        title VARCHAR(255) NOT NULL,
        author_id UUID REFERENCES authors(id),
        genre VARCHAR(100),
        copies_total INT DEFAULT 1,
        copies_available INT DEFAULT 1,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- Seed authors
    INSERT INTO authors (id, name, bio) VALUES
        ('a0000000-0000-0000-0000-000000000001', 'George Orwell', 'English novelist and essayist'),
        ('a0000000-0000-0000-0000-000000000002', 'Harper Lee', 'American novelist'),
        ('a0000000-0000-0000-0000-000000000003', 'Gabriel Garcia Marquez', 'Colombian novelist')
    ON CONFLICT (id) DO NOTHING;

    -- Seed books
    INSERT INTO books (id, isbn, title, author_id, genre, copies_total, copies_available) VALUES
        ('b0000000-0000-0000-0000-000000000001', '978-0451524935', '1984', 'a0000000-0000-0000-0000-000000000001', 'Fiction', 3, 3),
        ('b0000000-0000-0000-0000-000000000002', '978-0061120084', 'To Kill a Mockingbird', 'a0000000-0000-0000-0000-000000000002', 'Fiction', 2, 2),
        ('b0000000-0000-0000-0000-000000000003', '978-0060935467', 'One Hundred Years of Solitude', 'a0000000-0000-0000-0000-000000000003', 'Magical Realism', 2, 2)
    ON CONFLICT (id) DO NOTHING;
