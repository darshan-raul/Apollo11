apiVersion: batch/v1
kind: Job
metadata:
  name: init-auth-db
  namespace: apollo11-apps
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: init-auth-db
    spec:
      containers:
        - name: init
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              # Wait for postgres to be ready
              until pg_isready -h auth-postgres.apollo11-infra.svc.cluster.local -U postgres; do
                echo "Waiting for auth-postgres..."
                sleep 2
              done

              # Run init SQL (creates users table + seeds admin user)
              psql -h auth-postgres.apollo11-infra.svc.cluster.local -U postgres -d auth -f /init/init.sql || true

              echo "auth DB init done"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: init-script
              mountPath: /init
      volumes:
        - name: init-script
          configMap:
            name: auth-init-script
      restartPolicy: OnFailure
