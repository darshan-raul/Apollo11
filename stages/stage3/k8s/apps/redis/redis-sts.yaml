# Stage 3: redis converted from Deployment to StatefulSet.
# - Persistent volume so AOF / RDB survives pod restarts.
# - Wired to the headless service `redis-headless` for stable DNS.
# - AOF enabled (`--appendonly yes`) — gives durable writes for the
#   notification fan-out queue. Stage 7's search cache uses this too.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: apollo-airlines-apps
spec:
  serviceName: redis-headless
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: data
    spec:
      serviceAccountName: redis
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --appendonly yes
            - --appendfsync everysec
            - --save 60 100
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
