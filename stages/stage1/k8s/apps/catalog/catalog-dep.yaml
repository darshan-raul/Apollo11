apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: apollo11
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
        - name: catalog
          image: apollo11/catalog:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@catalog-postgres:5432/catalog"
            - name: REDIS_URL
              value: "redis://catalog-redis:6379"
          envFrom:
            - configMapRef:
                name: apollo11-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10