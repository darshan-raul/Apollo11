apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: apollo11-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification
          image: apollo11/notification:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: REDIS_URL
              value: "redis://notification-redis.apollo11-infra.svc.cluster.local:6380"
          envFrom:
            - configMapRef:
                name: apollo11-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
