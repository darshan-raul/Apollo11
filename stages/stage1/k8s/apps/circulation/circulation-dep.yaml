apiVersion: apps/v1
kind: Deployment
metadata:
  name: circulation
  namespace: apollo11
spec:
  replicas: 2
  selector:
    matchLabels:
      app: circulation
  template:
    metadata:
      labels:
        app: circulation
    spec:
      containers:
        - name: circulation
          image: apollo11/circulation:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@circulation-postgres:5432/circulation"
          envFrom:
            - configMapRef:
                name: apollo11-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10