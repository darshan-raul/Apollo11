services:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./code/frontend
      dockerfile: Dockerfile
    develop:
      watch:
        - path: ./code/frontend
          action: rebuild
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth:8080
      - CATALOG_SERVICE_URL=http://catalog:8081
      - CIRCULATION_SERVICE_URL=http://circulation:8082
    depends_on:
      auth:
        condition: service_started
      catalog:
        condition: service_started
      circulation:
        condition: service_started
    networks:
      - apollo-network

  # ─── Auth Service ───────────────────────────────────────────────────────────
  auth:
    build:
      context: ./code/auth
      dockerfile: Dockerfile
    develop:
      watch:
        - path: ./code/auth
          action: rebuild
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@auth-postgres:5432/auth
      - JWT_SECRET=apollo11-dev-secret
      - PORT=8080
    depends_on:
      auth-postgres:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./code/auth/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
    networks:
      - apollo-network

  auth-postgres:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth
    volumes:
      - type: volume
        source: auth-postgres-data
        target: /var/lib/postgresql/data
    networks:
      - apollo-network

  # ─── Catalog Service ────────────────────────────────────────────────────────
  catalog:
    build:
      context: ./code/catalog
      dockerfile: Dockerfile
    develop:
      watch:
        - path: ./code/catalog
          action: rebuild
    restart: always
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@catalog-postgres:5432/catalog
      - REDIS_URL=redis://catalog-redis:6379
      - PORT=8081
    depends_on:
      catalog-postgres:
        condition: service_healthy
      catalog-redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./code/catalog/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
    networks:
      - apollo-network

  catalog-postgres:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=catalog
    volumes:
      - type: volume
        source: catalog-postgres-data
        target: /var/lib/postgresql/data
    networks:
      - apollo-network

  catalog-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - apollo-network

  # ─── Circulation Service ────────────────────────────────────────────────────
  circulation:
    build:
      context: ./code/circulation
      dockerfile: Dockerfile
    develop:
      watch:
        - path: ./code/circulation
          action: rebuild
    restart: always
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@circulation-postgres:5432/circulation
      - AUTH_SERVICE_URL=http://auth:8080
      - CATALOG_SERVICE_URL=http://catalog:8081
      - NOTIFICATION_SERVICE_URL=http://notification:8083
      - FINES_SERVICE_URL=http://fines:8084
      - PORT=8082
    depends_on:
      circulation-postgres:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./code/circulation/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
    networks:
      - apollo-network

  circulation-postgres:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d circulation"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=circulation
    volumes:
      - type: volume
        source: circulation-postgres-data
        target: /var/lib/postgresql/data
    networks:
      - apollo-network

  # ─── Notification Service ────────────────────────────────────────────────────
  notification:
    build:
      context: ./code/notification
      dockerfile: Dockerfile
    develop:
      watch:
        - path: ./code/notification
          action: rebuild
    restart: always
    ports:
      - "8083:8083"
    environment:
      - REDIS_URL=redis://notification-redis:6380
      - PORT=8083
    depends_on:
      notification-redis:
        condition: service_healthy
    networks:
      - apollo-network

  notification-redis:
    image: redis:7-alpine
    command: redis-server --port 6380
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6380 ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - apollo-network

  # ─── Fines Service ───────────────────────────────────────────────────────────
  fines:
    build:
      context: ./code/fines
      dockerfile: Dockerfile
    develop:
      watch:
        - path: ./code/fines
          action: rebuild
    restart: always
    ports:
      - "8084:8084"
    environment:
      - DATABASE_PATH=/data/fines.db
      - PORT=8084
    volumes:
      - type: volume
        source: fines-data
        target: /data
    networks:
      - apollo-network

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  auth-postgres-data:
  catalog-postgres-data:
  circulation-postgres-data:
  fines-data:

networks:
  apollo-network:
    driver: bridge