services:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./code/frontend
      dockerfile: Dockerfile
      args:
        VITE_IDENTITY_URL: http://localhost:8080
        VITE_FLIGHT_URL: http://localhost:8081
        VITE_BOOKING_URL: http://localhost:8082
        VITE_SEARCH_URL: http://localhost:8083
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    networks:
      - apollo-airlines

  # ─── Identity Service ───────────────────────────────────────────────────────
  identity:
    build:
      context: ./code/identity
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@identity-db:5432/identity
      - JWT_SECRET=apollo-airlines-dev-secret
      - PORT=8080
    depends_on:
      identity-db:
        condition: service_healthy
    networks:
      - apollo-airlines

  identity-db:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identity"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=identity
    volumes:
      - type: volume
        source: identity-db-data
        target: /var/lib/postgresql/data
      - type: bind
        source: ./code/identity/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
    networks:
      - apollo-airlines

  # ─── Flight Service ─────────────────────────────────────────────────────────
  flight:
    build:
      context: ./code/flight
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@flight-db:5432/flight
      - JWT_SECRET=apollo-airlines-dev-secret
      - PORT=8081
    volumes:
      - type: bind
        source: ./code/flight/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
    command: sh -c 'DATABASE_URL="postgresql://postgres:postgres@flight-db:5432/flight" /app/flight-service'
    depends_on:
      flight-db:
        condition: service_healthy
    networks:
      - apollo-airlines

  flight-db:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flight"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=flight
    volumes:
      - type: volume
        source: flight-db-data
        target: /var/lib/postgresql/data
    networks:
      - apollo-airlines

  # ─── Booking Service ────────────────────────────────────────────────────────
  booking:
    build:
      context: ./code/booking
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@booking-db:5432/booking
      - FLIGHT_SERVICE_URL=http://flight:8081
      - IDENTITY_SERVICE_URL=http://identity:8080
      - NOTIFICATION_SERVICE_URL=http://notification:8084
      - JWT_SECRET=apollo-airlines-dev-secret
      - PORT=8082
    volumes:
      - type: bind
        source: ./code/booking/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
    command: sh -c 'DATABASE_URL="postgresql://postgres:postgres@booking-db:5432/booking" /app/booking-service'
    depends_on:
      booking-db:
        condition: service_healthy
    networks:
      - apollo-airlines

  booking-db:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=booking
    volumes:
      - type: volume
        source: booking-db-data
        target: /var/lib/postgresql/data
    networks:
      - apollo-airlines

  # ─── Search Service ─────────────────────────────────────────────────────────
  search:
    build:
      context: ./code/search
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8083:8083"
    environment:
      - FLIGHT_SERVICE_URL=http://flight:8081
      - PORT=8083
    depends_on:
      - flight
    networks:
      - apollo-airlines

  # ─── Notification Service ────────────────────────────────────────────────────
  notification:
    build:
      context: ./code/notification
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8084:8084"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8084
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - apollo-airlines

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - apollo-airlines

  # ─── Dozzle Log Viewer ──────────────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    ports:
      - "8085:8080"
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    networks:
      - apollo-airlines

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  identity-db-data:
  flight-db-data:
  booking-db-data:

networks:
  apollo-airlines:
    driver: bridge