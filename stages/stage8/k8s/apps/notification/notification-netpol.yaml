apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notification-allow-specific
  namespace: apollo11-apps
spec:
  podSelector:
    matchLabels:
      app: notification
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: apollo11-ui
            podSelector:
              matchLabels:
                app: frontend
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: apollo11-infra
        - namespaceSelector:
            matchLabels:
              name: apollo11-apps
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084