apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: apollo11-apps
  labels:
    app: search
    stage: "8"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
        stage: "8"
    spec:
      serviceAccountName: apollo11-apps
      priorityClassName: apollo11-app-critical
      terminationGracePeriodSeconds: 30
      volumes:
        - name: tmp-empty-dir
          emptyDir: {}
        - name: var-run-empty-dir
          emptyDir: {}
      containers:
        - name: search
          image: apollo11/search:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: FLIGHT_SERVICE_URL
              value: "http://flight.apollo11-apps.svc.cluster.local:8081"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: apollo11-config
                  key: REDIS_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: redis-password
            - name: PORT
              value: "8083"
          envFrom:
            - configMapRef:
                name: apollo11-config
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp-empty-dir
              mountPath: /tmp
            - name: var-run-empty-dir
              mountPath: /var/run
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 8083
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi