{{- /*
Stage 7: HorizontalPodAutoscaler for search.

CPU-based, min 2 / max 10. The `behavior` block is the modern
k8s pattern: scale-down has a 5-minute stabilization window so a
brief dip in traffic doesn't trigger a pod kill; scale-up is
immediate and can double replicas every 30s. This is the "scale
fast, contract slow" pattern that works well for spiky web traffic.

The HPA is paired with the VPA below — VPA in `Off` mode emits
recommendations only, so the two don't fight.

Set `.Values.autoscaling.search.enabled = false` to skip.
*/ -}}
{{- if .Values.autoscaling.search.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: search-hpa
  namespace: {{ .Values.namespaces.apps }}
  labels:
    {{- include "apollo11.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: search
  minReplicas: {{ .Values.autoscaling.search.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.search.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.search.targetCPU }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
{{- end }}
