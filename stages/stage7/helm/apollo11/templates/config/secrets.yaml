apiVersion: v1
kind: Secret
metadata:
  name: apollo-airlines-secrets
  namespace: {{ .Values.namespaces.apps }}
  labels:
    {{- include "apollo11.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword | quote }}
  JWT_SECRET:        {{ .Values.secret.jwtSecret | quote }}
---
# Kept for symmetry — if future ui-ns workloads need the JWT secret too,
# this is where they'd pull it from.
apiVersion: v1
kind: Secret
metadata:
  name: apollo-airlines-secrets
  namespace: {{ .Values.namespaces.ui }}
  labels:
    {{- include "apollo11.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secret.jwtSecret | quote }}
