{{- /*
Stage 7: PriorityClass.

Two priorities:
  * apollo-airlines-app-critical (value 1_000_000) — booking + search.
    These are user-facing and revenue-critical. Scheduled before all
    default-priority pods, which means during a node pressure event
    (memory pressure, scale-up crunch) they get to run first.
  * apollo-airlines-app-low (value -100_000) — notification.
    Background fan-out, OK to be preempted.

Why not just use `value: 0` for default? We want a *non-default* value
on these pods to make the wiring explicit. A pod with no
`priorityClassName` uses the system `globalDefault` (which we leave
unset, so it falls through to 0 — middle ground).

Set `.Values.priorityClasses.enabled = false` to skip the block entirely.
*/ -}}
{{- if .Values.priorityClasses.enabled }}
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ .Values.priorityClasses.critical.name }}
  labels:
    {{- include "apollo11.labels" . | nindent 4 }}
value: {{ .Values.priorityClasses.critical.value }}
globalDefault: false
description: "Apollo Airlines app-critical pods (booking, search). Scheduled before default-priority pods."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: {{ .Values.priorityClasses.low.name }}
  labels:
    {{- include "apollo11.labels" . | nindent 4 }}
value: {{ .Values.priorityClasses.low.value }}
globalDefault: false
description: "Apollo Airlines app-low pods (notification). Preempted under node pressure."
{{- end }}
