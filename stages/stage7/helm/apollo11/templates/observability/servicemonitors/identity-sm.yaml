apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: identity
  namespace: apollo-observability
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: apollo-airlines
    release: apollo11
spec:
  selector:
    matchLabels:
      app: identity
  namespaceSelector:
    matchNames:
      - apollo-airlines-apps
  endpoints:
    - port: 8080
      path: /metrics
      scheme: http
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
  jobLabel: app
