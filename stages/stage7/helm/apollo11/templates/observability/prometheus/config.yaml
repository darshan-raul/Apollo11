apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: apollo-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: apollo-airlines
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        cluster: apollo11
        # This label is what Grafana / Prometheus UIs use to disambiguate
        # multiple clusters in the dropdown.

    # Alertmanager isn't installed in Stage 6 (it arrives in Stage 8 with
    # the notifications module). For now, alerts are loaded into the
    # rules engine but only fire in /api/v1/rules. They'll start
    # forwarding to Alertmanager as soon as we set
    # `alerting:` below.
    # alerting:
    #   alertmanagers:
    #     - static_configs:
    #         - targets: ['alertmanager:9093']

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # The Prometheus operator's own pods (self-monitoring). Disabled
      # because we don't run the operator in this setup; we run a
      # plain Prometheus pod.
      # - job_name: 'prometheus-operator'
      #   static_configs:
      #     - targets: ['localhost:9090']

      # Kubernetes API server metrics — useful for control-plane dashboards.
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port]
            action: keep
            regex: default;kubernetes;https

      # Kubelet metrics (cadvisor — container CPU/memory). Each node
      # exposes /metrics on :10250.
      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      # ServiceMonitors from our chart (Phase 8).
      - job_name: 'service-monitors'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_service_port_name]
            action: keep
            regex: apollo-airlines-apps;identity|flight|booking|search|notification;.*
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service
