apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-trace-viewer
  namespace: apollo-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: apollo-airlines
    grafana_dashboard: "1"
data:
  dashboard.json: '{"annotations":{"list":[]},"editable":true,"fiscalYearStartMonth":0,"graphTooltip":1,"id":null,"uid":"apollo-trace-viewer","title":"Trace Viewer","tags":["apollo"],"timezone":"browser","schemaVersion":39,"version":1,"refresh":"30s","time":{"from":"now-1h","to":"now"},"templating":{"list":[]},"panels":[{"id":1,"type":"traces","title":"Recent traces (booking service)","datasource":{"type":"tempo","uid":"tempo"},"gridPos":{"h":16,"w":24,"x":0,"y":0},"targets":[{"datasource":{"type":"tempo","uid":"tempo"},"query":"{ service.name = \"booking\" }","queryType":"traceql","refId":"A"}],"options":{"showTraceId":true}}],"description":"Browse Tempo traces by service and operation."}'
