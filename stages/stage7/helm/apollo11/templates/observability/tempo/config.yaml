# Tempo single-binary configuration. Designed for a small cluster (kind).
#
# Storage: filesystem-backed. The PVC is a 5Gi local-path volume; on a
# real cluster you'd swap this for S3/GCS/Azure Blob.
#
# Receivers:
#   - otlp:  standard OTLP gRPC + HTTP (push from the OTEL Collector)
#   - jaeger:  support for legacy Jaeger clients (thrift over HTTP)
#
# In-memory trace cache:  100k traces, 1h TTL — small but fits dev.
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: apollo-observability
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: apollo-airlines
data:
  tempo.yaml: |
    server:
      http_listen_address: 0.0.0.0
      http_listen_port: 3100

    distributor:
      receivers:                           # this configuration will be ignored when using the v2 migration approach (default in Tempo 2.x)
        jaeger:
          protocols:
            thrift_http:
              endpoint: 0.0.0.0:14268

    ingester:
      trace_idle_period: 10s
      max_block_duration: 5m
      max_local_blocks_per_tracer: 10000

    compactor:
      compaction:
        block_retention: 48h

    storage:
      trace:
        backend: local
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/blocks
        pool:
          max_workers: 100

    querier:
      frontend_worker:
        frontend_address: tempo-query:9095

    query_range_lookback_duration: 0

    overrides:
      defaults:
        metrics_generator:
          processors: [service-graphs, span-metrics]
