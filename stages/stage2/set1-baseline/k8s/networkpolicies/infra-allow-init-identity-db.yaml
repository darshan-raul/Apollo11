# init-identity-db Job (same namespace) can reach identity-db on 5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-init-identity-db-to-identity-db
  namespace: apollo-airlines-apps
spec:
  podSelector:
    matchLabels:
      app: identity-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: init-identity-db
      ports:
        - protocol: TCP
          port: 5432
