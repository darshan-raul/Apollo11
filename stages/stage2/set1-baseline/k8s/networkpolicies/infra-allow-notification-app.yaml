# notification (in apps ns) reaches redis (in infra ns) on 6379.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-notification-app-to-redis
  namespace: apollo-airlines-apps
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: apollo-airlines-apps
          podSelector:
            matchLabels:
              app: notification
      ports:
        - protocol: TCP
          port: 6379
