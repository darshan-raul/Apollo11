apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: apollo-airlines-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      serviceAccountName: notification
      containers:
        - name: notification
          image: apollo11/notification:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: REDIS_URL
              value: "redis://redis.apollo-airlines-apps.svc.cluster.local:6379"
            - name: PORT
              value: "8084"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 5
