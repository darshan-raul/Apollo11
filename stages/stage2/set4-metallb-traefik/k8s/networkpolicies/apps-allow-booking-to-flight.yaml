# booking calls flight (apps → apps).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-booking-to-flight
  namespace: apollo-airlines-apps
spec:
  podSelector:
    matchLabels:
      app: flight
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: booking
      ports:
        - protocol: TCP
          port: 8081
