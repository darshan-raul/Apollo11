# Traefik v3.1 IngressController — DaemonSet on the control-plane node.
# Service is type=LoadBalancer; MetalLB assigns a real IP from the IP pool.
# In kind (no cloud LB), MetalLB in L2 mode gives the Service an IP from
# the kind docker network.
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: kube-system
spec:
  type: LoadBalancer
  selector:
    app: traefik
  ports:
    - name: web
      port: 80
      targetPort: 8000
