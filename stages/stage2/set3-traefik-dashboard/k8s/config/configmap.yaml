apiVersion: v1
kind: ConfigMap
metadata:
  name: apollo-airlines-config
  namespace: apollo-airlines-apps
data:
  NS_APPS: "apollo-airlines-apps"
  NS_UI:   "apollo-airlines-ui"
---
# UI namespace — frontend pulls VITE_* via envFrom. The browser uses these
# hostnames; the cluster's internal DNS is a separate concern.
apiVersion: v1
kind: ConfigMap
metadata:
  name: apollo-airlines-config
  namespace: apollo-airlines-ui
data:
  VITE_IDENTITY_URL:  "http://localhost:30083"
  VITE_FLIGHT_URL:    "http://localhost:30081"
  VITE_BOOKING_URL:   "http://localhost:30082"
  VITE_SEARCH_URL:    "http://localhost:30084"
