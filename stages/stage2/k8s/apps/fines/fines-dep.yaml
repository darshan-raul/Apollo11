apiVersion: apps/v1
kind: Deployment
metadata:
  name: fines
  namespace: apollo11-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fines
  template:
    metadata:
      labels:
        app: fines
    spec:
      serviceAccountName: apollo11-apps
      containers:
        - name: fines
          image: apollo11/fines:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: DATABASE_PATH
              value: "/data/fines.db"
          envFrom:
            - configMapRef:
                name: apollo11-config
          volumeMounts:
            - name: fines-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: fines-data
          emptyDir: {}
