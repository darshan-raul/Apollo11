apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  namespace: apollo-airlines-apps
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flight-route
  namespace: apollo-airlines-apps
spec:
  parentRefs:
    - name: gateway
      namespace: apollo-airlines-apps
  hostnames:
    - "flight.apolloairlines.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: flight
          port: 8081