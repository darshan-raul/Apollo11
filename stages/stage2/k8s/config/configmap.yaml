apiVersion: v1
kind: ConfigMap
metadata:
  name: apollo11-config
  namespace: apollo11-apps
data:
  # Service ports
  PORT_FRONTEND: "3000"
  PORT_AUTH: "8080"
  PORT_CATALOG: "8081"
  PORT_CIRCULATION: "8082"
  PORT_NOTIFICATION: "8083"
  PORT_FINES: "8084"

  # Service URLs (intra-cluster DNS)
  AUTH_SERVICE_URL: "http://auth.apollo11-apps.svc.cluster.local:8080"
  CATALOG_SERVICE_URL: "http://catalog.apollo11-apps.svc.cluster.local:8081"
  CIRCULATION_SERVICE_URL: "http://circulation.apollo11-apps.svc.cluster.local:8082"
  NOTIFICATION_SERVICE_URL: "http://notification.apollo11-apps.svc.cluster.local:8083"
  FINES_SERVICE_URL: "http://fines.apollo11-apps.svc.cluster.local:8084"

  # Database names
  AUTH_DB: "auth"
  CATALOG_DB: "catalog"
  CIRCULATION_DB: "circulation"

  # Redis
  CATALOG_REDIS_URL: "redis://catalog-redis:6379"
  NOTIFICATION_REDIS_URL: "redis://notification-redis:6380"

  # Fines (SQLite on emptyDir — data lost on pod restart, fixed in stage3)
  DATABASE_PATH: "/data/fines.db"
