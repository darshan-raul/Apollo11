# Gateway API HTTPRoute — routes HTTP traffic to catalog service
# Bound to the Gateway in gateway.yaml via parentRefs.
#
# HTTPRoute is the new generation of Ingress routing.
# Unlike legacy Ingress, HTTPRoute is typed, namespace-scoped,
# and supports cross-namespace routing via ReferenceGrant.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catalog-route
  namespace: apollo11-apps
  labels:
    app.kubernetes.io/name: catalog-route
    app.kubernetes.io/component: routing
spec:
  # parentRefs — attach this HTTPRoute to the Gateway in the same namespace.
  # sectionName must match a listener name defined on the Gateway.
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: apollo11-gateway
      namespace: apollo11-apps
      sectionName: http

  # hostnames — which incoming hostnames this route handles.
  # Envoy Gateway matches incoming requests by Host header.
  hostnames:
    - catalog.apollo11.local

  # Rules — in order, first match wins.
  rules:
    - # Path matching — match all paths under /
      matches:
        - path:
            type: PathPrefix
            value: /

      # backendRefs — where to forward matched traffic.
      # weight controls traffic distribution across backends (for canary deploys).
      backendRefs:
        - group: ""
          kind: Service
          name: catalog
          port: 8081
          weight: 1