apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: apollo-airlines-ui
spec:
  parentRefs:
    - name: apollo-gateway
      # Cross-namespace attachment: Gateway is in apollo-airlines-apps,
      # HTTPRoute is in apollo-airlines-ui. namespace MUST be explicit.
      namespace: apollo-airlines-apps
  hostnames: ["frontend.apollo.local"]
  rules:
    - backendRefs:
        - name: frontend
          port: 3000
