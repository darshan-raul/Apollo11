apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: apollo-airlines-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
        tier: public
    spec:
      serviceAccountName: identity
      terminationGracePeriodSeconds: 30
      containers:
        - name: identity
          image: apollo11/identity:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@identity-db:5432/identity?sslmode=disable"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: apollo-airlines-secrets
                  key: JWT_SECRET
            - name: PORT
              value: "8080"
          # Stage 4: three distinct probe paths. startupProbe gives the
          # container up to 30s to bootstrap before liveness takes over;
          # livenessProbe restarts on a hung process; readinessProbe pulls
          # the pod from Service endpoints if its DB becomes unreachable.
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          # Stage 4: requests == limits for Guaranteed QoS. FastAPI/uWSGI
          # is light, so 100m CPU / 128Mi memory is comfortable headroom.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 128Mi
