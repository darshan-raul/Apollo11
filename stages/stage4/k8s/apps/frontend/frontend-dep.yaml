apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: apollo-airlines-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: apollo11/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: apollo-airlines-config
          # NGINX serves these paths via the config baked into the image
          # (see code/frontend/nginx.conf). All three return 200
          # unconditionally — readiness on the frontend is a kubelet-level
          # check, not a downstream check.
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 64Mi
