apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: apollo-airlines-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      serviceAccountName: notification
      terminationGracePeriodSeconds: 30
      containers:
        - name: notification
          image: apollo11/notification:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: PORT
              value: "8084"
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 8084
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          # Lowest tier: notification just LPUSHes to a Redis list. The
          # fan-out worker isn't part of this stage, so the service is
          # mostly idle.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 64Mi
