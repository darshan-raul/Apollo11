apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: apollo11-apps
  labels:
    app: search
    stage: "4"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
        stage: "4"
    spec:
      serviceAccountName: apollo11-apps
      priorityClassName: apollo11-app-critical
      terminationGracePeriodSeconds: 30
      containers:
        - name: search
          image: apollo11/search:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: FLIGHT_SERVICE_URL
              value: "http://flight.apollo11-apps.svc.cluster.local:8081"
            - name: PORT
              value: "8083"
          envFrom:
            - configMapRef:
                name: apollo11-config
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 8083
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi