apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: apollo-pool
  namespace: metallb-system
spec:
  addresses:
    # 172.18.0.0/16 is the kind docker network.
    # The control-plane is usually 172.18.0.2; workers 172.18.0.3-4.
    # We allocate 172.18.0.50-100 for LoadBalancer services.
    - 172.18.0.50-172.18.0.100
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: apollo-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - apollo-pool
