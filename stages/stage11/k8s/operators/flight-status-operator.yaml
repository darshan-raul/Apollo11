apiVersion: v1
kind: ServiceAccount
metadata:
  name: flight-status-operator
  namespace: apollo11-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flight-status-operator
rules:
  - apiGroups: ["apollo11.io"]
    resources: ["flightstatuses", "flightstatuses/status", "flightstatuses/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flight-status-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flight-status-operator
subjects:
  - kind: ServiceAccount
    name: flight-status-operator
    namespace: apollo11-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-status-operator
  namespace: apollo11-operator
  labels:
    app: flight-status-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-status-operator
  template:
    metadata:
      labels:
        app: flight-status-operator
    spec:
      serviceAccountName: flight-status-operator
      containers:
        - name: operator
          image: apollo11/flight-status-operator:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: FLIGHT_SERVICE_URL
              value: "http://flight.apollo11-apps.svc.cluster.local:8081"
            - name: WATCH_NAMESPACE
              value: ""
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_NAME
              value: "flight-status-operator"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: flight-status-operator
  namespace: apollo11-operator
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: flight-status-operator
