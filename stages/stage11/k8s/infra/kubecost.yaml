apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecost
  namespace: apollo11-infra
  labels:
    app: kubecost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubecost
  template:
    metadata:
      labels:
        app: kubecost
    spec:
      containers:
        - name: kubecost
          image: kubecost/cost-model:latest
          ports:
            - containerPort: 9000
              name: http
          env:
            - name: PROMETHEUS_SERVER
              value: "http://prometheus:9090"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kubecost
  namespace: apollo11-infra
spec:
  ports:
    - port: 9000
      targetPort: 9000
      name: http
  selector:
    app: kubecost
