apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: apollo11-apps
  labels:
    app: identity
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
        tier: backend
    spec:
      containers:
        - name: identity
          image: apollo11/identity:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_HOST
              value: "identity-db.apollo11-infra.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "identity_db"
            - name: DATABASE_USER
              value: "apollo11"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: JWT_SECRET
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: apollo11-apps
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: identity
