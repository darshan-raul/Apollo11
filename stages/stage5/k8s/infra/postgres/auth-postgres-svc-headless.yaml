apiVersion: v1
kind: Service
metadata:
  name: auth-postgres-headless
  namespace: apollo11-infra
spec:
  # Headless: clusterIP: None means DNS returns pod IPs directly.
  # Pod identity is stable: auth-postgres-0.auth-postgres-headless.apollo11-infra.svc.cluster.local
  clusterIP: None
  selector:
    app: auth-postgres
  ports:
    - port: 5432
      targetPort: 5432
