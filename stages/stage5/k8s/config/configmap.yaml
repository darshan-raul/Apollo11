apiVersion: v1
kind: ConfigMap
metadata:
  name: apollo11-config
  namespace: apollo11-apps
data:
  # Service ports
  PORT_FRONTEND: "3000"
  PORT_AUTH: "8080"
  PORT_CATALOG: "8081"
  PORT_CIRCULATION: "8082"
  PORT_NOTIFICATION: "8083"
  PORT_FINES: "8084"

  # Service URLs (intra-cluster DNS — ClusterIP, same namespace)
  AUTH_SERVICE_URL: "http://auth.apollo11-apps.svc.cluster.local:8080"
  CATALOG_SERVICE_URL: "http://catalog.apollo11-apps.svc.cluster.local:8081"
  CIRCULATION_SERVICE_URL: "http://circulation.apollo11-apps.svc.cluster.local:8082"
  NOTIFICATION_SERVICE_URL: "http://notification.apollo11-apps.svc.cluster.local:8083"
  FINES_SERVICE_URL: "http://fines.apollo11-apps.svc.cluster.local:8084"

  # Database names
  AUTH_DB: "auth"
  CATALOG_DB: "catalog"
  CIRCULATION_DB: "circulation"

  # Redis — Headless FQDNs (Stage 3: redis StatefulSets with persistent storage)
  CATALOG_REDIS_URL: "redis://catalog-redis.apollo11-infra.svc.cluster.local:6379"
  NOTIFICATION_REDIS_URL: "redis://notification-redis.apollo11-infra.svc.cluster.local:6380"

  # Fines (SQLite on persistent PVC — survives pod restart)
  DATABASE_PATH: "/data/fines.db"
