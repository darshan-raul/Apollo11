apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging overlay — 2 replicas per service, latest tag.
# Matches the production default replica count but with the rolling
# `:latest` tag for fast feedback.

namespace: apollo-airlines-apps

labels:
  - includeSelectors: false
    pairs:
      environment: staging

resources:
  - ../base

replicas:
  - name: identity
    count: 2
  - name: flight
    count: 2
  - name: booking
    count: 2
  - name: search
    count: 2
  - name: notification
    count: 2
  - name: frontend
    count: 2
