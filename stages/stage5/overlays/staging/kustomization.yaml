{{- /*
Staging overlay — 2 replicas per service, standard image tags
*/ -}}
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apollo11

commonLabels:
  environment: staging

replicas:
  - name: identity
    count: 2
  - name: flight
    count: 2
  - name: booking
    count: 2
  - name: search
    count: 2
  - name: notification
    count: 2
  - name: frontend
    count: 2