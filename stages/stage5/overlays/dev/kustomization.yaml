apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev overlay — 1 replica per service, dev image tag.
# Smallest footprint; cheap for local iteration. Resources, probes, and
# terminationGracePeriod are inherited from the base.

namespace: apollo-airlines-apps

labels:
  - includeSelectors: false
    pairs:
      environment: dev

resources:
  - ../base

replicas:
  - name: identity
    count: 1
  - name: flight
    count: 1
  - name: booking
    count: 1
  - name: search
    count: 1
  - name: notification
    count: 1
  - name: frontend
    count: 1

images:
  - name: apollo11/identity
    newTag: dev
  - name: apollo11/flight
    newTag: dev
  - name: apollo11/booking
    newTag: dev
  - name: apollo11/search
    newTag: dev
  - name: apollo11/notification
    newTag: dev
  - name: apollo11/frontend
    newTag: dev
