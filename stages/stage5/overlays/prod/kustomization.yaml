apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay — 3 replicas per service, pinned :v1.0.0 tag, and
# PodDisruptionBudgets applied for booking + frontend to guarantee the
# flagship service and UI survive voluntary disruptions.

namespace: apollo-airlines-apps

labels:
  - includeSelectors: false
    pairs:
      environment: prod

resources:
  - ../base
  - pdb.yaml

replicas:
  - name: identity
    count: 3
  - name: flight
    count: 3
  - name: booking
    count: 3
  - name: search
    count: 3
  - name: notification
    count: 3
  - name: frontend
    count: 3

images:
  - name: apollo11/identity
    newTag: v1.0.0
  - name: apollo11/flight
    newTag: v1.0.0
  - name: apollo11/booking
    newTag: v1.0.0
  - name: apollo11/search
    newTag: v1.0.0
  - name: apollo11/notification
    newTag: v1.0.0
  - name: apollo11/frontend
    newTag: v1.0.0
