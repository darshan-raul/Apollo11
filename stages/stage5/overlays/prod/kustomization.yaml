{{- /*
Prod overlay — 3 replicas, resource limits enforced
*/ -}}
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apollo11

commonLabels:
  environment: prod

replicas:
  - name: identity
    count: 3
  - name: flight
    count: 3
  - name: booking
    count: 3
  - name: search
    count: 3
  - name: notification
    count: 3
  - name: frontend
    count: 3

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: identity
      spec:
        replicas: 3
      spec:
        template:
          spec:
            containers:
              - name: identity
                image: apollo11/identity:v1.0.0
    target:
      kind: Deployment
      name: identity
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: flight
      spec:
        replicas: 3
      spec:
        template:
          spec:
            containers:
              - name: flight
                image: apollo11/flight:v1.0.0
    target:
      kind: Deployment
      name: flight
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: booking
      spec:
        replicas: 3
      spec:
        template:
          spec:
            containers:
              - name: booking
                image: apollo11/booking:v1.0.0
    target:
      kind: Deployment
      name: booking
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: search
      spec:
        replicas: 3
      spec:
        template:
          spec:
            containers:
              - name: search
                image: apollo11/search:v1.0.0
    target:
      kind: Deployment
      name: search
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification
      spec:
        replicas: 3
      spec:
        template:
          spec:
            containers:
              - name: notification
                image: apollo11/notification:v1.0.0
    target:
      kind: Deployment
      name: notification