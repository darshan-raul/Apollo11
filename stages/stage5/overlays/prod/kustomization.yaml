{{- /*
Prod overlay — 3 replicas, resource limits enforced, pod disruption budget
*/ -}}
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apollo11

commonLabels:
  environment: prod

replicas:
  - name: auth
    count: 3
  - name: catalog
    count: 3
  - name: circulation
    count: 3
  - name: notification
    count: 3
  - name: frontend
    count: 3

patches:
  # Prod image tag
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth
      spec:
        replicas: 3
      spec:
        template:
          spec:
            containers:
              - name: auth
                image: apollo11/auth:v1.0.0
    target:
      kind: Deployment
      name: auth