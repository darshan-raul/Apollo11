server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Stage 4: probe endpoints for the kubelet.
    # All three return 200 unconditionally — readiness on the frontend is
    # a kubelet-level check, not a downstream check, since NGINX has no
    # local DB/Redis to ping. The pod's readiness state is "process is
    # alive and serving", which is exactly what these return.
    location = /healthz/startup { add_header Content-Type text/plain; return 200 "starting"; }
    location = /healthz/live    { add_header Content-Type text/plain; return 200 "alive"; }
    location = /healthz/ready   { add_header Content-Type text/plain; return 200 "ready"; }
    # Legacy aliases kept for back-compat with Stage 1-3 smoke tests.
    location = /healthz         { add_header Content-Type text/plain; return 200 "ok"; }
    location = /readyz          { add_header Content-Type text/plain; return 200 "ok"; }

    # SPA fallback — unknown paths serve index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
