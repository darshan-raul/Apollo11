{{- /*
3 idempotent seed Jobs, one per database. Each Job:
  1. Waits for its target DB with `pg_isready`
  2. Applies /init/seed.sql with `psql`
  3. Exits 0 on success; restartPolicy: OnFailure; backoffLimit: 3.

Idempotency:
  - identity seed:  ON CONFLICT (id) DO NOTHING  (id is PRIMARY KEY)
  - flight seed:    ON CONFLICT (code) DO NOTHING  (airports.code is UNIQUE).
                    flights are generated by CROSS JOIN over 31 days; the
                    (flight_number, departure_time) pair is implicitly unique
                    so a re-run adds a fresh day's data.
  - booking seed:   empty (`SELECT 1;`) — kept for symmetry + smoke test.

The seed ConfigMaps are created alongside the StatefulSets in
infra/postgres.yaml; we reference them by name here.
*/ -}}
{{- $databases := list "identity" "flight" "booking" -}}
{{- range $db := $databases }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-{{ $db }}-db
  namespace: {{ $.Values.namespaces.apps }}
  labels:
    {{- include "apollo11.labels" $ | nindent 4 }}
    app: seed-{{ $db }}-db
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: seed-{{ $db }}-db
    spec:
      serviceAccountName: init-{{ $db }}-db
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              set -e
              until pg_isready -h {{ $db }}-db -U postgres; do echo "Waiting for {{ $db }}-db..."; sleep 2; done
              psql -h {{ $db }}-db -U postgres -d {{ $db }} -v ON_ERROR_STOP=1 -f /init/seed.sql
              echo "{{ $db }} DB seeded"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo-airlines-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: seed-script
              mountPath: /init
      volumes:
        - name: seed-script
          configMap:
            name: {{ $db }}-db-seed
{{- end }}
