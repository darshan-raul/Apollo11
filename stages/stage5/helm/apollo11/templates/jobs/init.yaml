{{- /*
Init jobs — run once to seed databases
*/ -}}

{{- /* Identity DB init job */ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: init-identity-db
  namespace: {{ .Values.namespaces.infra }}
  labels:
    app: init-identity-db
    stage: "5"
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: init-identity-db
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              echo "Seeding identity DB..."
              psql -h identity-db.{{ .Values.namespaces.infra }}.svc.cluster.local -U postgres -d identity -f /init/init.sql || echo "Identity DB init done or already exists"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: init-script
              mountPath: /init
      volumes:
        - name: init-script
          configMap:
            name: identity-db-init-script

