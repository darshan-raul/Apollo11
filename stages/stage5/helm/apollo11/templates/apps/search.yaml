{{- /*
Search Deployment + Service
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: {{ .Values.namespaces.apps }}
  labels:
    app: search
    stage: "5"
spec:
  replicas: {{ .Values.apps.search.replicas }}
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
        stage: "5"
    spec:
      serviceAccountName: {{ .Values.serviceAccounts.apps }}
      priorityClassName: {{ .Values.priorityClassName }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriod.apps }}
      containers:
        - name: search
          image: {{ .Values.image.repository }}/search:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.apps.search.port }}
          env:
            - name: FLIGHT_SERVICE_URL
              value: "http://flight.{{ .Values.namespaces.apps }}.svc.cluster.local:8081"
            - name: PORT
              value: "{{ .Values.apps.search.port }}"
          envFrom:
            - configMapRef:
                name: apollo11-config
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: {{ .Values.apps.search.port }}
            initialDelaySeconds: 0
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: {{ .Values.apps.search.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: {{ .Values.apps.search.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.apps.search.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: search
  namespace: {{ .Values.namespaces.apps }}
spec:
  selector:
    app: search
  ports:
    - port: 8083
      targetPort: {{ .Values.apps.search.port }}