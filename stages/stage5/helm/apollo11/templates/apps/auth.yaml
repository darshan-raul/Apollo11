{{- /*
Auth Deployment template
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: {{ .Values.namespaces.apps }}
  labels:
    app: auth
    stage: "5"
spec:
  replicas: {{ .Values.apps.auth.replicas }}
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
        stage: "5"
    spec:
      serviceAccountName: {{ .Values.serviceAccounts.apps }}
      priorityClassName: {{ .Values.priorityClassName }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriod.apps }}
      containers:
        - name: auth
          image: {{ .Values.image.repository }}/auth:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.apps.auth.port }}
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:***@auth-postgres.{{ .Values.namespaces.infra }}.svc.cluster.local:5432/auth"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: JWT_SECRET
            - name: PORT
              value: "{{ .Values.apps.auth.port }}"
          envFrom:
            - configMapRef:
                name: apollo11-config
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: {{ .Values.apps.auth.port }}
            initialDelaySeconds: 0
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: {{ .Values.apps.auth.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: {{ .Values.apps.auth.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.apps.auth.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: {{ .Values.namespaces.apps }}
spec:
  selector:
    app: auth
  ports:
    - port: 8080
      targetPort: {{ .Values.apps.auth.port }}