{{- /*
PostgreSQL StatefulSets — auth, catalog, circulation
*/ -}}

{{- /* Auth PostgreSQL */ -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-postgres
  namespace: {{ .Values.namespaces.infra }}
  labels:
    app: auth-postgres
    stage: "5"
spec:
  serviceName: auth-postgres-headless
  replicas: {{ .Values.postgres.auth.replicas }}
  selector:
    matchLabels:
      app: auth-postgres
  template:
    metadata:
      labels:
        app: auth-postgres
        stage: "5"
    spec:
      serviceAccountName: {{ .Values.serviceAccounts.infra }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriod.infra }}
      initContainers:
        - name: init
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for auth-postgres..."
              until pg_isready -h auth-postgres -U postgres; do sleep 1; done
              psql -h auth-postgres -U postgres -d auth -f /init/init.sql || true
              echo "auth DB init complete"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: init-script
              mountPath: /init
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apollo11-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "auth"
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-h", "localhost", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-h", "localhost", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postgres.auth.resources | nindent 10 }}
      volumes:
        - name: init-script
          configMap:
            name: auth-postgres-init-script
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.auth.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-postgres-headless
  namespace: {{ .Values.namespaces.infra }}
spec:
  clusterIP: None
  selector:
    app: auth-postgres

