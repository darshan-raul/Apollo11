{{- /*
ConfigMap + Secret template
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: apollo11-config
  namespace: {{ .Values.namespaces.apps }}
  labels:
    app.kubernetes.io/name: apollo11
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  PORT_IDENTITY: "{{ .Values.apps.identity.port }}"
  PORT_FLIGHT: "{{ .Values.apps.flight.port }}"
  PORT_BOOKING: "{{ .Values.apps.booking.port }}"
  PORT_SEARCH: "{{ .Values.apps.search.port }}"
  PORT_NOTIFICATION: "{{ .Values.apps.notification.port }}"
  PORT_FRONTEND: "{{ .Values.frontend.port }}"

  VITE_IDENTITY_URL: "http://identity.{{ .Values.namespaces.apps }}.svc.cluster.local:8080"
  VITE_FLIGHT_URL: "http://flight.{{ .Values.namespaces.apps }}.svc.cluster.local:8081"
  VITE_BOOKING_URL: "http://booking.{{ .Values.namespaces.apps }}.svc.cluster.local:8082"
  VITE_SEARCH_URL: "http://search.{{ .Values.namespaces.apps }}.svc.cluster.local:8083"

  IDENTITY_SERVICE_URL: "http://identity.{{ .Values.namespaces.apps }}.svc.cluster.local:8080"
  FLIGHT_SERVICE_URL: "http://flight.{{ .Values.namespaces.apps }}.svc.cluster.local:8081"
  NOTIFICATION_SERVICE_URL: "http://notification.{{ .Values.namespaces.apps }}.svc.cluster.local:8084"
  SEARCH_SERVICE_URL: "http://search.{{ .Values.namespaces.apps }}.svc.cluster.local:8083"
  BOOKING_SERVICE_URL: "http://booking.{{ .Values.namespaces.apps }}.svc.cluster.local:8082"

  REDIS_URL: "redis://redis.{{ .Values.namespaces.infra }}.svc.cluster.local:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: apollo11-secrets
  namespace: {{ .Values.namespaces.infra }}
  labels:
    app.kubernetes.io/name: apollo11
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres"
  JWT_SECRET: "apollo-airlines-dev-secret-change-in-production"