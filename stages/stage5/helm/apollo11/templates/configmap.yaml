{{- /*
ConfigMap template — multi-document YAML
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: apollo11-config
  namespace: {{ .Values.namespaces.apps }}
  labels:
    app.kubernetes.io/name: apollo11
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  PORT: "8080"
  CATALOG_PORT: "8081"
  CIRCULATION_PORT: "8082"
  NOTIFICATION_PORT: "8083"
  FINES_PORT: "8084"
  FRONTEND_PORT: "3000"
  AUTH_URL: "http://auth.{{ .Values.namespaces.apps }}.svc.cluster.local:8080"
  CATALOG_URL: "http://catalog.{{ .Values.namespaces.apps }}.svc.cluster.local:8081"
---
apiVersion: v1
kind: Secret
metadata:
  name: apollo11-secrets
  namespace: {{ .Values.namespaces.apps }}
  labels:
    app.kubernetes.io/name: apollo11
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: "changeme"
  JWT_SECRET: "dev-secret-change-in-prod"