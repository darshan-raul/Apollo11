{{- /*
13 ServiceAccounts total:
  - 6 app SAs (identity, flight, booking, search, notification, frontend)
  - 4 data SAs (identity-db, flight-db, booking-db, redis)
  - 3 init-job SAs (init-identity-db, init-flight-db, init-booking-db)

No Role/RoleBinding yet — those arrive in Stage 8 (RBAC). For now the
SAs exist so workloads can opt-in to them (and so NetworkPolicy /
admission controllers in later stages have a stable identity to bind to).
*/ -}}
{{- range $sa := concat .Values.serviceAccounts.apps .Values.serviceAccounts.data .Values.serviceAccounts.initJobs }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa }}
  namespace: {{ $.Values.namespaces.apps }}
  labels:
    {{- include "apollo11.labels" $ | nindent 4 }}
{{- end }}
{{- range $sa := .Values.serviceAccounts.ui }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa }}
  namespace: {{ $.Values.namespaces.ui }}
  labels:
    {{- include "apollo11.labels" $ | nindent 4 }}
{{- end }}
