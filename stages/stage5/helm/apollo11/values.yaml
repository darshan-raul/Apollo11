---
# Stage 5: Apollo Airlines — flight management system.
# All workloads are derived from Stage 4 (probes + Guaranteed QoS + graceful
# SIGTERM) and packaged as a single Helm chart.

# ----------------------------------------------------------------------------
# Image configuration
# ----------------------------------------------------------------------------
image:
  repository: apollo11
  pullPolicy: IfNotPresent
  tag: latest

# ----------------------------------------------------------------------------
# Namespaces
# ----------------------------------------------------------------------------
# Stage 2 collapsed the original 3-namespace plan (`infra`/`apps`/`ui`) down
# to 2 to keep DB hostnames short. We stick with that here.
namespaces:
  apps: apollo-airlines-apps
  ui: apollo-airlines-ui

# ----------------------------------------------------------------------------
# ServiceAccounts
# ----------------------------------------------------------------------------
# 13 SAs in total:
#   - 6 app SAs (identity, flight, booking, search, notification, frontend)
#   - 4 data SAs (identity-db, flight-db, booking-db, redis)
#   - 3 init-job SAs (init-identity-db, init-flight-db, init-booking-db)
# No Role/RoleBinding yet — those arrive in Stage 8 (RBAC).
serviceAccounts:
  apps:
    - identity
    - flight
    - booking
    - search
    - notification
  data:
    - identity-db
    - flight-db
    - booking-db
    - redis
  initJobs:
    - init-identity-db
    - init-flight-db
    - init-booking-db
  ui:
    - frontend

# ----------------------------------------------------------------------------
# ConfigMap + Secret
# ----------------------------------------------------------------------------
config:
  appsNamespace: apollo-airlines-apps
  uiNamespace: apollo-airlines-ui
  # Frontend VITE_* URLs — built into the React image at build time. These
  # match the HTTPRoute hostnames below. If you change `gateway.hostSuffix`,
  # the image has to be rebuilt (or `apply.sh` will rebuild it for you).
  viteUrls:
    identity: "http://identity.apollo.local"
    flight:   "http://flight.apollo.local"
    booking:  "http://booking.apollo.local"
    search:   "http://search.apollo.local"

secret:
  postgresPassword: "postgres"
  jwtSecret: "apollo-airlines-dev-secret-change-in-production"

# ----------------------------------------------------------------------------
# Postgres (3 StatefulSets)
# ----------------------------------------------------------------------------
postgres:
  storage: 1Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 256Mi
  initScripts:
    identity: |
      CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

      CREATE TABLE IF NOT EXISTS users (
          id               UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          email            VARCHAR(255) UNIQUE NOT NULL,
          password_hash    VARCHAR(255) NOT NULL,
          first_name       VARCHAR(100),
          last_name        VARCHAR(100),
          passport_number  VARCHAR(50),
          loyalty_tier     VARCHAR(20) DEFAULT 'STANDARD',
          role             VARCHAR(20) DEFAULT 'PASSENGER',
          is_active        BOOLEAN DEFAULT TRUE,
          created_at       TIMESTAMP DEFAULT NOW(),
          updated_at       TIMESTAMP DEFAULT NOW()
      );
    flight: |
      CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

      CREATE TABLE IF NOT EXISTS airports (
          id        UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          code      VARCHAR(3) UNIQUE NOT NULL,
          name      VARCHAR(255) NOT NULL,
          city      VARCHAR(100) NOT NULL,
          country   VARCHAR(100) NOT NULL,
          created_at TIMESTAMP DEFAULT NOW()
      );

      CREATE TABLE IF NOT EXISTS flights (
          id                UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          flight_number     VARCHAR(10) NOT NULL,
          origin            VARCHAR(3)  NOT NULL REFERENCES airports(code),
          destination       VARCHAR(3)  NOT NULL REFERENCES airports(code),
          departure_time    TIMESTAMP   NOT NULL,
          arrival_time      TIMESTAMP   NOT NULL,
          total_capacity    INTEGER     NOT NULL,
          available_seats   INTEGER     NOT NULL,
          status            VARCHAR(20) DEFAULT 'SCHEDULED',
          created_at        TIMESTAMP   DEFAULT NOW(),
          UNIQUE (flight_number, departure_time)
      );
    booking: |
      CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

      CREATE TABLE IF NOT EXISTS bookings (
          id                 UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          user_id            UUID         NOT NULL,
          flight_id          UUID         NOT NULL,
          passengers         INTEGER      NOT NULL DEFAULT 1,
          status             VARCHAR(20)  NOT NULL DEFAULT 'CONFIRMED',
          total_price        DECIMAL(10,2) NOT NULL,
          booking_reference  VARCHAR(10)  UNIQUE NOT NULL,
          created_at         TIMESTAMP    DEFAULT NOW(),
          updated_at         TIMESTAMP    DEFAULT NOW()
      );
  seedSql:
    identity: |
      -- Identity seed: 2 users (admin, passenger).
      INSERT INTO users (id, email, password_hash, first_name, last_name, passport_number, loyalty_tier, role, is_active)
      VALUES
          ('a1b2c3d4-e5f6-7890-abcd-ef1234567890', 'admin@apolloairlines.com', '$2b$12$kflBUCuS6Lagf1HRHUX8c.R68u93qgg7CRQ9exm8/x5IhA3s9eT3i', 'Admin', 'User', 'ADMIN123', 'PLATINUM', 'ADMIN', true),
          ('b2c3d4e5-f6a7-8901-bcde-f12345678901', 'passenger@apolloairlines.com', '$2b$12$YK9qpQ28hFUSICvWuiLm5OLjiibWe.zXXDsLiHl7YNrT6adahZ8Gu', 'Passenger', 'User', 'PASS123', 'STANDARD', 'PASSENGER', true)
      ON CONFLICT (id) DO NOTHING;
    flight: |
      INSERT INTO airports (id, code, name, city, country) VALUES
          ('11111111-1111-1111-1111-111111111111', 'BOM', 'Chhatrapati Shivaji Maharaj International', 'Mumbai', 'India'),
          ('22222222-2222-2222-2222-222222222222', 'DEL', 'Indira Gandhi International', 'New Delhi', 'India'),
          ('33333333-3333-3333-1111-111111111111'::uuid, 'SIN', 'Changi Airport', 'Singapore', 'Singapore'),
          ('44444444-4444-4444-1111-111111111111'::uuid, 'DXB', 'Dubai International', 'Dubai', 'UAE'),
          ('55555555-5555-5555-1111-111111111111'::uuid, 'LHR', 'Heathrow Airport', 'London', 'UK'),
          ('66666666-6666-6666-1111-111111111111'::uuid, 'JFK', 'John F. Kennedy International', 'New York', 'USA')
      ON CONFLICT (code) DO NOTHING;

      INSERT INTO flights (flight_number, origin, destination, departure_time, arrival_time, total_capacity, available_seats, status)
      SELECT
          f.flight_number, f.origin, f.destination,
          (CURRENT_DATE + n * INTERVAL '1 day' + f.dep_time::time)::timestamp,
          (CURRENT_DATE + n * INTERVAL '1 day' + f.arr_time::time)::timestamp,
          f.total_capacity, f.total_capacity, 'SCHEDULED'
      FROM (VALUES
          ('AA101', 'BOM', 'SIN', '08:00:00'::time, '14:30:00'::time, 180),
          ('AA102', 'SIN', 'BOM', '20:00:00'::time, '23:30:00'::time, 180),
          ('AA201', 'DEL', 'DXB', '09:30:00'::time, '13:00:00'::time, 220),
          ('AA202', 'DXB', 'DEL', '22:00:00'::time, '02:30:00'::time, 220),
          ('AA301', 'BOM', 'LHR', '01:00:00'::time, '10:00:00'::time, 300),
          ('AA401', 'DEL', 'JFK', '02:00:00'::time, '14:00:00'::time, 280)
      ) AS f(flight_number, origin, destination, dep_time, arr_time, total_capacity)
      CROSS JOIN generate_series(0, 30) AS n;
    booking: |
      -- Bookings are created at runtime; seed is empty but kept for symmetry.
      SELECT 1;

# ----------------------------------------------------------------------------
# Redis
# ----------------------------------------------------------------------------
redis:
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ----------------------------------------------------------------------------
# Application services
# ----------------------------------------------------------------------------
# Per-tier resource tiers (Guaranteed QoS — requests == limits):
#   default:  100m / 128Mi
#   flagship: 200m / 256Mi  (booking — calls flight + identity + notification)
#   low:       50m /  64Mi  (notification)
#   edge:      50m /  64Mi  (frontend NGINX)
apps:
  identity:
    tier: default
    port: 8080
    replicas: 2
    dependsOn: [identity-db]
  flight:
    tier: default
    port: 8081
    replicas: 2
    dependsOn: [flight-db]
  booking:
    tier: flagship
    port: 8082
    replicas: 2
    dependsOn: [booking-db, flight, identity, notification]
  search:
    tier: default
    port: 8083
    replicas: 2
    dependsOn: []
  notification:
    tier: low
    port: 8084
    replicas: 2
    dependsOn: []

frontend:
  port: 3000
  replicas: 2

# ----------------------------------------------------------------------------
# Resource tiers — consumed by app templates
# ----------------------------------------------------------------------------
tiers:
  default:
    cpu: 100m
    memory: 128Mi
  flagship:
    cpu: 200m
    memory: 256Mi
  low:
    cpu: 50m
    memory: 64Mi
  edge:
    cpu: 50m
    memory: 64Mi

# ----------------------------------------------------------------------------
# Probes
# ----------------------------------------------------------------------------
# startupProbe gives a slow-starting container up to 30s to bootstrap
# (periodSeconds × failureThreshold) before liveness takes over.
# livenessProbe restarts the container on a hung process.
# readinessProbe pulls the pod from Service endpoints on a downstream blip.
probes:
  startup:
    httpGet:
      path: /healthz/startup
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 6
  liveness:
    httpGet:
      path: /healthz/live
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    httpGet:
      path: /healthz/ready
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

# ----------------------------------------------------------------------------
# Graceful shutdown
# ----------------------------------------------------------------------------
# terminationGracePeriodSeconds must be > the in-process drain budget:
#   apps:    30s (matches Go http.Server.Shutdown timeout / uvicorn timeout)
#   data:    60s (Postgres checkpoint + Redis AOF rewrite)
terminationGracePeriod:
  apps: 30
  data: 60

# ----------------------------------------------------------------------------
# PodDisruptionBudgets
# ----------------------------------------------------------------------------
# Two PDBs — booking (flagship) and frontend (UI). With replicas=2 and
# minAvailable=1, a node drain cannot take either below 1 ready pod.
pdb:
  enabled: true
  booking:
    minAvailable: 1
  frontend:
    minAvailable: 1

# ----------------------------------------------------------------------------
# Gateway API + MetalLB
# ----------------------------------------------------------------------------
# Stage 5 bundles the Stage 2/3 access stack so a single `helm install`
# gives you a working cluster with hostnames like `frontend.apollo.local`
# pointing at a real LoadBalancer IP.
gateway:
  enabled: true
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  className: eg
  gatewayName: apollo-gateway
  hostSuffix: apollo.local
  # Frontend host is special — it lives in apollo-airlines-ui ns.
  frontendHost: frontend.apollo.local
  envoy:
    # Toggles whether the Envoy install YAML is bundled in the chart
    # (offline-friendly) or pulled at apply-time. Default bundled.
    bundleInstall: true

metallb:
  enabled: true
  # 172.18.0.0/16 is the kind docker network. control-plane ≈ .2, workers .3-.4.
  # Allocate .50-.100 for LoadBalancer services.
  ipPool:
    addresses:
      - 172.18.0.50-172.18.0.100
  bundleInstall: true

# ----------------------------------------------------------------------------
# Image pull secrets (for GHCR / private registries in prod)
# ----------------------------------------------------------------------------
imagePullSecrets: []

# ----------------------------------------------------------------------------
# Pod priority (reserved for Stage 7+ when we add PriorityClasses)
# ----------------------------------------------------------------------------
priorityClassName: ""
