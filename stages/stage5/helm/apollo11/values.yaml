---
image:
  repository: apollo11
  pullPolicy: IfNotPresent
  tag: latest

namespace: apollo11

namespaces:
  infra: apollo11-infra
  apps: apollo11-apps
  ui: apollo11-ui

serviceAccounts:
  infra: apollo11-infra
  apps: apollo11-apps
  ui: apollo11-ui

priorityClassName: apollo11-app-critical

imagePullSecrets: []

ingress:
  enabled: true
  className: traefik
  host: apollo11.local
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web

postgres:
  identity:
    replicas: 1
    storage: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  flight:
    replicas: 1
    storage: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  booking:
    replicas: 1
    storage: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

redis:
  replicas: 1
  storage: 1Gi
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

apps:
  identity:
    replicas: 2
    port: 8080
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  flight:
    replicas: 2
    port: 8081
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  booking:
    replicas: 2
    port: 8082
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  search:
    replicas: 2
    port: 8083
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  notification:
    replicas: 2
    port: 8084
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

frontend:
  replicas: 2
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

terminationGracePeriod:
  apps: 30
  infra: 60

probes:
  startup:
    periodSeconds: 5
    failureThreshold: 6
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3