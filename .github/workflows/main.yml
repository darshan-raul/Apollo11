name: CI

# Stage 5 CI: lint + validate the Helm chart and Kustomize overlays, build
# container images, and push to GHCR on main / tag events.
#
# ArgoCD (out of stage 5 scope) handles deployment. This workflow is
# intentionally CD-light: we don't auto-deploy from CI.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint + validate packaging
  # ---------------------------------------------------------------------------
  lint:
    name: Helm + Kustomize validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: helm lint
        working-directory: stages/stage5
        run: helm lint helm/apollo11

      - name: helm template (smoke render)
        working-directory: stages/stage5
        run: |
          helm template apollo11 helm/apollo11 > /tmp/stage5-render.yaml
          # Count resources — should be >100 (apps + 4 StatefulSets + Envoy CRDs + MetalLB CRDs)
          echo "Resources rendered: $(grep -c '^kind:' /tmp/stage5-render.yaml)"

      - name: kustomize build (dev)
        working-directory: stages/stage5
        run: kubectl kustomize overlays/dev > /tmp/stage5-kustomize-dev.yaml

      - name: kustomize build (staging)
        working-directory: stages/stage5
        run: kubectl kustomize overlays/staging > /tmp/stage5-kustomize-staging.yaml

      - name: kustomize build (prod)
        working-directory: stages/stage5
        run: kubectl kustomize overlays/prod > /tmp/stage5-kustomize-prod.yaml

      - name: shellcheck scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck stages/stage5/scripts/*.sh

  # ---------------------------------------------------------------------------
  # 2. Build container images (matrix, no push on PRs)
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity
          - flight
          - booking
          - search
          - notification
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract VITE_* URLs for frontend build
        id: vite
        if: matrix.service == 'frontend'
        run: |
          CHART=stages/stage5/helm/apollo11/values.yaml
          echo "vite_id=$(grep VITE_IDENTITY_URL $CHART | awk -F'"' '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "vite_fl=$(grep VITE_FLIGHT_URL   $CHART | awk -F'"' '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "vite_bk=$(grep VITE_BOOKING_URL  $CHART | awk -F'"' '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "vite_sr=$(grep VITE_SEARCH_URL   $CHART | awk -F'"' '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: stages/stage5/code/${{ matrix.service }}
          file: stages/stage5/code/${{ matrix.service }}/Dockerfile
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
          build-args: |
            VITE_IDENTITY_URL=${{ steps.vite.outputs.vite_id }}
            VITE_FLIGHT_URL=${{ steps.vite.outputs.vite_fl }}
            VITE_BOOKING_URL=${{ steps.vite.outputs.vite_bk }}
            VITE_SEARCH_URL=${{ steps.vite.outputs.vite_sr }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 3. Push to GHCR (only on main push or tag)
  # ---------------------------------------------------------------------------
  push:
    name: Push images to GHCR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity
          - flight
          - booking
          - search
          - notification
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract VITE_* URLs for frontend build
        id: vite
        if: matrix.service == 'frontend'
        run: |
          CHART=stages/stage5/helm/apollo11/values.yaml
          echo "vite_id=$(grep VITE_IDENTITY_URL $CHART | awk -F'"' '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "vite_fl=$(grep VITE_FLIGHT_URL   $CHART | awk -F'"' '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "vite_bk=$(grep VITE_BOOKING_URL  $CHART | awk -F'"' '{print $2}')" >> "$GITHUB_OUTPUT"
          echo "vite_sr=$(grep VITE_SEARCH_URL   $CHART | awk -F'"' '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: stages/stage5/code/${{ matrix.service }}
          file: stages/stage5/code/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          build-args: |
            VITE_IDENTITY_URL=${{ steps.vite.outputs.vite_id }}
            VITE_FLIGHT_URL=${{ steps.vite.outputs.vite_fl }}
            VITE_BOOKING_URL=${{ steps.vite.outputs.vite_bk }}
            VITE_SEARCH_URL=${{ steps.vite.outputs.vite_sr }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
